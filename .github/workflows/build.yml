# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Builds Abx2t on the three target platforms: fetch the pinned ONLYOFFICE release
# (cached, hash-verified), package assets.zip (compiles allfontsgen from the vendored
# sources if missing), publish NativeAOT, run the end-to-end smoke test, upload the
# artifact -- and attach it to the GitHub release when a v* tag is pushed.

name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # release asset upload on tag builds

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows-x86_64
            exe: src/bin/Release/net10.0/win-x64/publish/Abx2t.exe
          - runner: macos-latest
            platform: macos-arm64
            exe: src/bin/Release/net10.0/osx-arm64/publish/Abx2t
          - runner: ubuntu-latest
            platform: linux-x86_64
            exe: src/bin/Release/net10.0/linux-x64/publish/Abx2t

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache ONLYOFFICE release download
        uses: actions/cache@v4
        with:
          path: build/cache
          key: onlyoffice-${{ matrix.platform }}-${{ hashFiles('VERSIONS') }}

      - name: Fetch ONLYOFFICE binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./build/fetch_onlyoffice_windows.ps1

      - name: Fetch ONLYOFFICE binaries (macOS)
        if: runner.os == 'macOS'
        run: zsh build/fetch_onlyoffice_macos.sh

      - name: Fetch ONLYOFFICE binaries (Linux)
        if: runner.os == 'Linux'
        run: bash build/fetch_onlyoffice_linux.sh

      - name: Package assets.zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./build/package_windows.ps1

      - name: Package assets.zip (macOS)
        if: runner.os == 'macOS'
        run: zsh build/package_macos.sh

      - name: Package assets.zip (Linux)
        if: runner.os == 'Linux'
        run: bash build/package_linux.sh

      - name: Publish (NativeAOT)
        run: dotnet publish src/Abx2t.csproj -c Release

      - name: Install fonts for the smoke test (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -qy fonts-liberation

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./build/smoke_test.ps1 -ExePath ${{ matrix.exe }}

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: bash build/smoke_test.sh ${{ matrix.exe }}

      - name: Assemble distribution zip
        shell: bash
        run: |
          version=$(grep '^ONLYOFFICE_CORE_BUILD=' VERSIONS | cut -d= -f2 | tr -d '\r')
          name="Abx2t-v${version}-${{ matrix.platform }}"
          mkdir -p dist
          case "${{ runner.os }}" in
            Windows)
              pwsh -Command "Compress-Archive -Path '${{ matrix.exe }}' -DestinationPath 'dist/$name.zip'"
              pwsh -Command "(Get-FileHash -Algorithm SHA256 'dist/$name.zip').Hash.ToLowerInvariant() + '  $name.zip'" > "dist/$name.zip.sha256"
              ;;
            macOS)
              # ditto preserves the executable bit through the zip round-trip
              ditto -c -k "${{ matrix.exe }}" "dist/$name.zip"
              (cd dist && shasum -a 256 "$name.zip" > "$name.zip.sha256")
              ;;
            Linux)
              zip -j -q "dist/$name.zip" "${{ matrix.exe }}"
              (cd dist && sha256sum "$name.zip" > "$name.zip.sha256")
              ;;
          esac
          echo "DIST_NAME=$name" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DIST_NAME }}
          path: dist/*
          if-no-files-found: error

      - name: Attach to the GitHub release (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" --title "AbX2T $tag" --generate-notes || true
          gh release upload "$tag" dist/* --clobber
